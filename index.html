<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fin 📊 持仓日报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --bg: oklch(0.13 0.005 260);
    --bg-elevated: oklch(0.17 0.005 260);
    --bg-hover: oklch(0.20 0.005 260);
    --border: oklch(0.25 0.005 260);
    --border-subtle: oklch(0.20 0.005 260);
    --text: oklch(0.93 0.005 260);
    --text-secondary: oklch(0.60 0.005 260);
    --text-muted: oklch(0.45 0.005 260);
    --gold: oklch(0.80 0.15 85);
    --gold-dim: oklch(0.65 0.12 85);
    --gold-glow: oklch(0.80 0.15 85 / 0.15);
    --red: oklch(0.65 0.2 25);
    --red-bg: oklch(0.65 0.2 25 / 0.1);
    --green: oklch(0.70 0.17 155);
    --green-bg: oklch(0.70 0.17 155 / 0.1);
    --blue: oklch(0.70 0.15 250);
    --blue-bg: oklch(0.70 0.15 250 / 0.1);
    --radius: 10px;
    --font: 'Inter', -apple-system, system-ui, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 32px 0 24px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: oklch(0.15 0 0);
  }

  .brand h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .brand h1 span {
    color: var(--gold);
  }

  .brand .subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  /* Date Nav */
  .date-nav {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 4px;
  }

  .date-nav button {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 150ms;
    display: flex;
    align-items: center;
  }

  .date-nav button:hover {
    background: var(--bg-hover);
    color: var(--text);
  }

  .date-nav .current-date {
    font-size: 13px;
    font-weight: 500;
    font-family: var(--mono);
    min-width: 150px;
    text-align: center;
    color: var(--text);
  }

  /* Tabs */
  .tab-bar {
    display: flex;
    gap: 2px;
    margin: 20px 0 28px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 4px;
    width: fit-content;
  }

  .tab {
    padding: 8px 20px;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: var(--font);
    border-radius: 6px;
    transition: all 200ms;
  }

  .tab:hover { color: var(--text); }

  .tab.active {
    background: var(--gold-glow);
    color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold-dim);
  }

  /* Sections */
  .section {
    margin-bottom: 20px;
    animation: fadeIn 400ms ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
  }

  .section-header i { width: 16px; height: 16px; }

  .card {
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color 200ms;
  }

  .card:hover { border-color: var(--border); }

  /* Stock Grid */
  .stock-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 10px;
  }

  .stock-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 16px 18px;
    transition: all 200ms;
    cursor: default;
  }

  .stock-card:hover {
    border-color: var(--border);
    transform: translateY(-1px);
  }

  .stock-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .stock-name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 2px;
  }

  .stock-code {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-muted);
  }

  .stock-price {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    text-align: right;
  }

  .stock-change {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    text-align: right;
    margin-top: 2px;
    padding: 2px 6px;
    border-radius: 4px;
    display: inline-block;
    float: right;
  }

  .up .stock-price { color: var(--red); }
  .up .stock-change { color: var(--red); background: var(--red-bg); }
  .down .stock-price { color: var(--green); }
  .down .stock-change { color: var(--green); background: var(--green-bg); }
  .flat .stock-price { color: var(--text-secondary); }
  .flat .stock-change { color: var(--text-secondary); background: var(--bg-hover); }

  .stock-note {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border-subtle);
    line-height: 1.5;
  }

  /* Content */
  .content {
    line-height: 1.8;
    font-size: 14px;
    color: var(--text-secondary);
  }

  .content h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--gold);
    margin: 16px 0 6px;
  }

  .content h3:first-child { margin-top: 0; }

  .content p { margin-bottom: 10px; }

  .content ul {
    padding-left: 18px;
    margin-bottom: 10px;
  }

  .content li {
    margin-bottom: 4px;
    color: var(--text);
  }

  .content strong { color: var(--text); font-weight: 600; }

  /* Risk tags */
  .risk-card {
    border-left: 2px solid var(--red);
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .empty-state p {
    color: var(--text-muted);
    font-size: 14px;
  }

  .empty-state .hint {
    font-size: 12px;
    margin-top: 8px;
    color: var(--text-muted);
    opacity: 0.6;
  }

  /* Footer */
  .footer {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border-subtle);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-muted);
  }

  .footer .disclaimer {
    max-width: 500px;
    line-height: 1.5;
  }

  .footer .timestamp {
    font-family: var(--mono);
    white-space: nowrap;
  }

  /* Convention note */
  .convention {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 12px;
    padding: 4px 10px;
    background: var(--bg-hover);
    border-radius: 20px;
  }

  .dot-red { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
  .dot-green { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }

  /* Mobile */
  @media (max-width: 640px) {
    header { flex-direction: column; gap: 16px; align-items: flex-start; }
    .stock-grid { grid-template-columns: 1fr; }
    .tab-bar { width: 100%; }
    .tab { flex: 1; text-align: center; }
    .footer { flex-direction: column; gap: 12px; text-align: center; }
  }
</style>
</head>
<body>

<!-- Password Lock -->
<div id="lockScreen" style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:20px;">
  <div class="brand-icon" style="width:48px;height:48px;font-size:24px;">F</div>
  <div style="font-size:14px;color:var(--text-secondary);">输入密码访问</div>
  <div style="display:flex;gap:8px;position:relative;" id="pinContainer">
    <input type="tel" id="pinReal" maxlength="4" inputmode="numeric" pattern="[0-9]*" autofocus
      placeholder="····"
      style="width:200px;height:56px;background:var(--bg-elevated);border:1px solid var(--border);
        border-radius:8px;color:var(--text);font-family:var(--mono);font-size:28px;text-align:center;
        letter-spacing:16px;outline:none;caret-color:var(--gold);transition:border-color 200ms;"
      onfocus="this.style.borderColor='var(--gold)'" onblur="this.style.borderColor='var(--border)'">
  </div>
  <button id="pinSubmit" onclick="window._checkPin && window._checkPin()" style="
    margin-top:4px;padding:8px 32px;background:var(--gold);color:oklch(0.15 0 0);
    border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;
    font-family:var(--font);transition:opacity 200ms;opacity:0.9;
  " onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.9'">进入</button>
  <div id="pinError" style="font-size:12px;color:var(--red);opacity:0;transition:opacity 200ms;">密码错误</div>
</div>

<style>
  .pin-display {
    width: 44px; height: 52px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 22px;
    color: var(--text);
    transition: border-color 200ms;
  }
  .pin-display.active { border-color: var(--gold); }
  .pin-display.filled { border-color: var(--gold-dim); }
  .pin-display.shake, .shake {
    animation: shake 400ms ease-out;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
</style>

<script>
(function() {
  const HASH = '8e5d1b8b6dcde91bfca4e4b1e6fe123a0f34e45d6a9e3c7f82d1b04c5a96b2e1';
  const stored = sessionStorage.getItem('fin_auth');
  if (stored === 'ok') { document.getElementById('lockScreen').style.display = 'none'; document.querySelector('.container').style.display = 'block'; return; }

  document.getElementById('lockScreen').style.display = 'flex';
  document.querySelector('.container').style.display = 'none';

  const pinInput = document.getElementById('pinReal');

  document.getElementById('lockScreen').addEventListener('click', () => pinInput.focus());
  setTimeout(() => pinInput.focus(), 100);

  pinInput.addEventListener('input', () => {
    pinInput.value = pinInput.value.replace(/[^0-9]/g, '').slice(0,4);
    if (pinInput.value.length === 4) checkPin();
  });

  pinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkPin(); });

  async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  window._checkPin = checkPin;

  async function checkPin() {
    const code = pinInput.value;
    if (code.length < 4) return;
    const hash = await sha256(code);
    if (hash === 'a11f793d5f24841552b2befc8d946d9f7e5652edfb58bd49c3a8423a6031c952') {
      sessionStorage.setItem('fin_auth', 'ok');
      document.getElementById('lockScreen').style.display = 'none';
      document.querySelector('.container').style.display = 'block';
    } else {
      document.getElementById('pinError').style.opacity = '1';
      pinInput.value = '';
      pinInput.style.borderColor = 'var(--red)';
      pinInput.classList.add('shake');
      pinInput.focus();
      setTimeout(() => {
        pinInput.classList.remove('shake');
        pinInput.style.borderColor = 'var(--border)';
        document.getElementById('pinError').style.opacity = '0';
      }, 1500);
    }
  }
})();
</script>

<div class="container" style="display:none;">
  <header>
    <div class="brand">
      <div class="brand-icon">F</div>
      <div>
        <h1><span>Fin</span> Dashboard</h1>
        <div class="subtitle">你的持仓，我来盯。</div>
      </div>
    </div>
    <div class="date-nav">
      <button onclick="changeDate(-1)"><i data-lucide="chevron-left" style="width:16px;height:16px"></i></button>
      <div class="current-date" id="currentDate"></div>
      <button onclick="changeDate(1)"><i data-lucide="chevron-right" style="width:16px;height:16px"></i></button>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('pre')" id="tab-pre">☀ 盘前</button>
    <button class="tab" onclick="switchTab('post')" id="tab-post">☽ 盘后</button>
  </div>

  <div id="report-content">
    <div class="empty-state">
      <div class="empty-icon">◌</div>
      <p>加载中...</p>
    </div>
  </div>

  <div class="footer" id="footer" style="display:none">
    <div class="disclaimer">⚠ 数据仅供参考，不构成投资建议。投资有风险，决策需谨慎。</div>
    <div class="timestamp" id="reportTimestamp"></div>
  </div>
</div>

<script>
const REPORTS_DIR = './reports/';
let currentDate = new Date();
let currentTab = 'pre';

function getShanghaiDate(d) {
  const utc = d.getTime() + d.getTimezoneOffset() * 60000;
  return new Date(utc + 8 * 60 * 60000);
}

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDisplayDate(d) {
  const w = ['日','一','二','三','四','五','六'];
  return `${formatDate(d)}  周${w[d.getDay()]}`;
}

function changeDate(delta) {
  currentDate.setDate(currentDate.getDate() + delta);
  loadReport();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-pre').classList.toggle('active', tab === 'pre');
  document.getElementById('tab-post').classList.toggle('active', tab === 'post');
  loadReport();
}

async function loadReport() {
  const dateStr = formatDate(currentDate);
  document.getElementById('currentDate').textContent = formatDisplayDate(currentDate);
  const filename = `${dateStr}-${currentTab === 'pre' ? 'morning' : 'afternoon'}.json`;
  const container = document.getElementById('report-content');
  const footer = document.getElementById('footer');

  try {
    const resp = await fetch(REPORTS_DIR + filename);
    if (!resp.ok) throw new Error('Not found');
    const data = await resp.json();
    renderReport(data);
    footer.style.display = 'flex';
    document.getElementById('reportTimestamp').textContent = data.timestamp || '';
  } catch (e) {
    footer.style.display = 'none';
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${currentTab === 'pre' ? '☀' : '☽'}</div>
        <p>${dateStr} 的${currentTab === 'pre' ? '盘前' : '盘后'}报告还没生成</p>
        <div class="hint">交易日自动更新</div>
      </div>`;
  }
}

function renderReport(data) {
  const container = document.getElementById('report-content');
  let html = '';

  if (data.market) {
    html += `
    <div class="section" style="animation-delay:0ms">
      <div class="section-header"><i data-lucide="bar-chart-3"></i> 大盘概况</div>
      <div class="card"><div class="content">${data.market}</div></div>
    </div>`;
  }

  if (data.stocks && data.stocks.length) {
    html += `
    <div class="section" style="animation-delay:80ms">
      <div class="section-header"><i data-lucide="briefcase"></i> 持仓表现</div>
      <div class="stock-grid">
        ${data.stocks.map(s => {
          const cls = s.change > 0 ? 'up' : s.change < 0 ? 'down' : 'flat';
          const sign = s.change > 0 ? '+' : '';
          return `
          <div class="stock-card ${cls}">
            <div class="stock-top">
              <div>
                <div class="stock-name">${s.name}</div>
                <div class="stock-code">${s.code}</div>
              </div>
              <div>
                <div class="stock-price">${s.price || '—'}</div>
                <div class="stock-change">${sign}${s.change || 0}%</div>
              </div>
            </div>
            ${s.note ? `<div class="stock-note">${s.note}</div>` : ''}
          </div>`;
        }).join('')}
      </div>
      <div class="convention">
        <span class="dot-red"></span> 涨
        <span class="dot-green"></span> 跌
        <span style="margin-left:4px">A股惯例</span>
      </div>
    </div>`;
  }

  if (data.analysis) {
    html += `
    <div class="section" style="animation-delay:160ms">
      <div class="section-header"><i data-lucide="lightbulb"></i> 分析与建议</div>
      <div class="card"><div class="content">${data.analysis}</div></div>
    </div>`;
  }

  if (data.risks) {
    html += `
    <div class="section" style="animation-delay:240ms">
      <div class="section-header"><i data-lucide="alert-triangle"></i> 风险提示</div>
      <div class="card risk-card"><div class="content">${data.risks}</div></div>
    </div>`;
  }

  container.innerHTML = html;
  lucide.createIcons();
}

currentDate = getShanghaiDate(new Date());
loadReport();
lucide.createIcons();
</script>
</body>
</html>
